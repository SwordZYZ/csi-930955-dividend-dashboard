<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏观与特定资产指标监控</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* 1. 全局设计变量 */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-color: #1d1d1f;
            --sub-text: #86868b;
            --shadow: rgba(0, 0, 0, 0.05);
            --kpi-bg: #f5f5f7;
            
            /* 🎯 预设两路资产的专属高亮色彩 */
            --csi-color: #1890ff;  /* 蓝 */
            --fred-color: #52c41a; /* 绿 */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --card-bg: #2c2c2e;
                --text-color: #f5f5f7;
                --sub-text: #8e8e93;
                --shadow: rgba(0, 0, 0, 0.3);
                --kpi-bg: #3a3a3c;
            }
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Arial", "Microsoft YaHei", "PingFang SC", sans-serif; 
            margin: 20px; 
            background-color: var(--bg-color); 
            transition: background-color 0.3s ease;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 { 
            text-align: center; 
            color: var(--text-color); 
            margin-top: 10px;
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* 2. 顶置高阶选项卡（Tabs切换卡片） */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .tab-card {
            background-color: var(--card-bg);
            padding: 14px 24px;
            border-radius: 16px;
            box-shadow: 0 4px 12px var(--shadow);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-width: 220px;
            border: 2px solid transparent;
        }

        /* 🎯 优化点 1：红利低波激活时使用蓝色方案 */
        .tab-card.active.csi-style {
            border-color: var(--csi-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(24, 144, 255, 0.15);
        }
        .tab-card.active.csi-style .title-text {
            color: var(--csi-color);
        }

        /* 🎯 优化点 1：美债实际利率激活时使用绿色方案 */
        .tab-card.active.fred-style {
            border-color: var(--fred-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(82, 196, 26, 0.15);
        }
        .tab-card.active.fred-style .title-text {
            color: var(--fred-color);
        }

        /* 🎯 优化点 2：完美的字体字号三级分层 */
        .title-text {
            display: block;      /* 独占一行实现自然换行 */
            font-size: 14px;     /* 👈 资产名称：比日期大，比数值小 */
            color: var(--text-color);
            font-weight: 600;
            margin-bottom: 2px;
            transition: color 0.3s;
        }
        
        .date-text {
            display: block;      /* 独占一行实现自然换行 */
            font-size: 11px;     /* 👈 最小字号：浅灰色日期 */
            color: var(--sub-text);
            font-weight: 400;
            margin-bottom: 8px;
        }

        .tab-value {
            font-size: 22px;     /* 👈 最大字号：展示最醒目的最新数值 */
            font-weight: 700;
            color: var(--text-color);
            font-family: sf-pro-display, -apple-system, "SF Mono", Monaco, monospace, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }

        /* 3. 图表骨架容器 */
        #main { 
            width: 100%; 
            height: 520px; 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 12px var(--shadow); 
            box-sizing: border-box;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="page-title">红利低波100股息率趋势</h2>
        
        <div class="tabs-container">
            <div class="tab-card active csi-style" id="tab-csi" onclick="switchTab('csi')">
                <span class="title-text">红利低波 100 股息率</span>
                <span class="date-text" id="csi-date">加载中...</span>
                <div class="tab-value" id="csi-val">-- %</div>
            </div>
            <div class="tab-card" id="tab-fred" onclick="switchTab('fred')">
                <span class="title-text">美债 10 年实际利率</span>
                <span class="date-text" id="fred-date">加载中...</span>
                <div class="tab-value" id="fred-val">-- %</div>
            </div>
        </div>

        <div id="main"></div>
    </div>

    <script {nonce}>
        let myChart = null;
        let globalData = null;
        let currentTab = 'csi'; 

        const isDarkMode = () => window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        // 日期无损格式化
        const parseDate = (dateStr) => dateStr.toString().replace(/^(\d{4})(\d{2})(\d{2})$/, '$1-$2-$3');

        function updateKpiCards(data) {
            // 1. 组装红利低波卡片组件
            if (data.csi930955 && data.csi930955.length > 0) {
                const latestCsi = data.csi930955[data.csi930955.length - 1];
                document.getElementById('csi-date').innerText = parseDate(latestCsi['日期Date']);
                document.getElementById('csi-val').innerText = `${latestCsi['股息率2（计算用股本）D/P2'].toFixed(2)}%`;
            }
            // 2. 组装美债实际利率卡片组件 (对接美债利率Rate)
            if (data.us10ytip && data.us10ytip.length > 0) {
                const latestFred = data.us10ytip[data.us10ytip.length - 1];
                document.getElementById('fred-date').innerText = parseDate(latestFred['日期Date']);
                document.getElementById('fred-val').innerText = `${latestFred['美债利率Rate'].toFixed(2)}%`;
            }
        }

        function renderChart() {
            if (!globalData) return;

            if (myChart) {
                myChart.dispose();
            }

            const currentTheme = isDarkMode() ? 'dark' : null;
            myChart = echarts.init(document.getElementById('main'), currentTheme);

            const themeConfigs = isDarkMode() ? {
                backgroundColor: '#2c2c2e',
                gridColor: '#444446',
            } : {
                backgroundColor: '#ffffff',
                gridColor: '#e5e5ea',
            };

            let option = {
                backgroundColor: themeConfigs.backgroundColor,
                tooltip: { 
                    trigger: 'axis', 
                    backgroundColor: isDarkMode() ? 'rgba(44, 44, 46, 0.96)' : 'rgba(255, 255, 255, 0.96)',
                    textStyle: { color: isDarkMode() ? '#fff' : '#000' }
                },
                grid: { left: '4%', right: '4%', bottom: '12%', containLabel: true },
                xAxis: { 
                    type: 'category', 
                    boundaryGap: false,
                    axisLabel: { rotate: 45, margin: 12, hideOverlap: true }
                },
                yAxis: { 
                    type: 'value', 
                    axisLabel: { formatter: '{value} %' }, 
                    splitLine: { lineStyle: { color: themeConfigs.gridColor } }
                },
                series: []
            };

            // 路由调度：决定渲染红利还是美债
            if (currentTab === 'csi') {
                document.getElementById('page-title').innerText = "红利低波100股息率趋势";
                const csiArray = globalData.csi930955 || [];
                
                option.xAxis.data = csiArray.map(item => parseDate(item['日期Date']));
                option.legend = {
                    data: ['股息率1 (总股本)', '股息率2 (计算股本)'],
                    bottom: 0,
                    selected: { '股息率1 (总股本)': false, '股息率2 (计算股本)': true }
                };
                option.yAxis.min = function (value) {
                    if (value.min >= 4.0) return '4.00';
                    return (Math.floor((value.min - 0.01) * 10) / 10).toFixed(2);
                };
                option.yAxis.max = function (value) {
                    if (value.max <= 5.0) return '5.00';
                    return (Math.ceil((value.max + 0.01) * 10) / 10).toFixed(2);
                };
                option.series = [
                    { name: '股息率1 (总股本)', type: 'line', data: csiArray.map(item => item['股息率1（总股本）D/P1']), smooth: false, showSymbol: true, symbolSize: 5, itemStyle: { color: '#ff4d4f' } },
                    { name: '股息率2 (计算股本)', type: 'line', data: csiArray.map(item => item['股息率2（计算用股本）D/P2']), smooth: false, showSymbol: true, symbolSize: 5, itemStyle: { color: '#1890ff' } }
                ];

            } else if (currentTab === 'fred') {
                document.getElementById('page-title').innerText = "美债 10 年实际利率趋势";
                const fredArray = globalData.us10ytip || [];
                
                option.xAxis.data = fredArray.map(item => parseDate(item['日期Date']));
                option.legend = { data: ['美债 10 年实际利率'], bottom: 0 };
                
                // 智能美债 Y 轴上下限自适应算法：完美适配任意正负数区间
                option.yAxis.min = function (value) {
                    if (value.min >= 1.0) return '1.00';
                    return (Math.floor((value.min - 0.01) * 10) / 10).toFixed(2);
                };
                option.yAxis.max = function (value) {
                    if (value.max <= 2.0) return '2.00';
                    return (Math.ceil((value.max + 0.01) * 10) / 10).toFixed(2);
                };
                option.series = [
                    // 🎯 精准匹配你 data.json 中的美债利率Rate 键名
                    { name: '美债 10 年实际利率', type: 'line', data: fredArray.map(item => item['美债利率Rate']), smooth: false, showSymbol: true, symbolSize: 5, itemStyle: { color: '#52c41a' } }
                ];
            }

            myChart.setOption(option);
        }

        // 🎯 核心控制器：控制标签卡的多资产专属高亮类名跃迁
        function switchTab(tabName) {
            if (currentTab === tabName) return;
            currentTab = tabName;
            
            // 动态挂载专属高亮类名，精准响应对应图表的折线颜色
            const tabCsi = document.getElementById('tab-csi');
            const tabFred = document.getElementById('tab-fred');
            
            if (tabName === 'csi') {
                tabCsi.classList.add('active', 'csi-style');
                tabFred.classList.remove('active', 'fred-style');
            } else {
                tabCsi.classList.remove('active', 'csi-style');
                tabFred.classList.add('active', 'fred-style');
            }
            
            renderChart();
        }

        // 初始化
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                globalData = data;
                updateKpiCards(globalData); 
                renderChart();              
            });

        window.addEventListener('resize', () => {
            if (myChart) myChart.resize();
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            renderChart();
        });
    </script>
</body>
</html>
